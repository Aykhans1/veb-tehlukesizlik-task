<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şəxsi Maliyyə Hesabatı</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #121212; color: #ffffff; min-height: 100vh; padding: 30px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: #1ed760; font-size: 2.5rem; }
        header p { color: #a7a7a7; }
        .main-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: #181818; border-radius: 8px; padding: 25px; transition: transform 0.3s ease; border: 1px solid #282828; }
        .card:hover { transform: translateY(-5px); background: #282828; }
        .card-header { font-size: 0.9rem; color: #a7a7a7; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .card-value { font-size: 2rem; font-weight: 700; color: #ffffff; }
        .card-subtext { font-size: 0.8rem; margin-top: 8px; }
        .text-green { color: #1ed760; }
        .text-red { color: #ff4757; }
        .charts-section { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .charts-section { grid-template-columns: 1fr; } }
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 15px; }
        h2 { color: #ffffff; font-size: 1.3rem; border-bottom: 1px solid #282828; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h1>Aylıq Maliyyə Hesabatı</h1>
        <p>Gəlir və Xərclərinizin İcmalı</p>
    </header>

    <div class="main-stats">
        <div class="card">
            <div class="card-header">Ümumi Balans</div>
            <div class="card-value">3,450.00 ₼</div>
            <div class="card-subtext text-green">▲ Keçən aydan +5% çox</div>
        </div>
        <div class="card">
            <div class="card-header">Bu Aykı Gəlir</div>
            <div class="card-value">5,200.00 ₼</div>
            <div class="card-subtext text-green">Maaş + Bonuslar</div>
        </div>
        <div class="card">
            <div class="card-header">Bu Aykı Xərc</div>
            <div class="card-value">1,750.00 ₼</div>
            <div class="card-subtext text-red">▲ Keçən aydan +2% çox</div>
        </div>
        <div class="card">
            <div class="card-header">Yığım Dərəcəsi</div>
            <div class="card-value">66.3%</div>
            <div class="card-subtext" style="color: #a7a7a7;">Hədəf: 50%</div>
        </div>
    </div>

    <div class="charts-section">
        <div class="card">
            <h2>Gəlir və Xərc Dinamikası</h2>
            <div class="chart-container">
                <canvas id="lineChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h2>Xərc Kateqoriyaları</h2>
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // Serverdən (server.js-dən) qrafik rəqəmlərini çəkirik
    async function fetchReportData() {
        try {
            const response = await fetch('/api/report-data');
            const data = await response.json();
            drawCharts(data);
        } catch (error) {
            console.error('Məlumatları çəkmək mümkün olmadı', error);
        }
    }

    function drawCharts(data) {
        Chart.defaults.color = '#a7a7a7';
        Chart.defaults.borderColor = '#282828';

        // Xətt Qrafiki
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: data.lineChart.labels,
                datasets: [{
                    label: 'Gəlir (₼)',
                    data: data.lineChart.income,
                    borderColor: '#1ed760',
                    backgroundColor: 'rgba(30, 215, 96, 0.1)',
                    fill: true,
                    tension: 0.4
                }, {
                    label: 'Xərc (₼)',
                    data: data.lineChart.expense,
                    borderColor: '#ff4757',
                    backgroundColor: 'rgba(255, 71, 87, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Halqa Qrafiki
        const ctxDoughnut = document.getElementById('doughnutChart').getContext('2d');
        new Chart(ctxDoughnut, {
            type: 'doughnut',
            data: {
                labels: ['Kirayə', 'Qida', 'Nəqliyyat', 'Əyləncə', 'Kommunal'],
                datasets: [{
                    data: data.doughnutChart.categories,
                    backgroundColor: ['#1ed760', '#ff4757', '#3742fa', '#ffa502', '#a4b0be'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    fetchReportData();
</script>

</body>
</html>
