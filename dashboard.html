<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şəxsi Maliyyə Hesabatı</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #121212; color: #ffffff; min-height: 100vh; padding: 30px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: #1ed760; font-size: 2.5rem; }
        header p { color: #a7a7a7; }

        .main-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }

        .card { background: #181818; border-radius: 8px; padding: 25px; border: 1px solid #282828; }
        .card-header { font-size: 0.9rem; color: #a7a7a7; margin-bottom: 10px; }
        .card-value { font-size: 2rem; font-weight: 700; }

        .charts-section { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-container { height: 300px; }

        .input-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-box input {
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        .btn {
            background: #1ed760;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="dashboard-container">

    <header>
        <h1>Aylıq Maliyyə Hesabatı</h1>
        <p>Gəlir və Xərclərinizin İcmalı</p>
    </header>

    <!-- DATA ADD FORM -->
    <div class="input-box">
        <input type="number" id="incomeInput" placeholder="Gəlir">
        <input type="number" id="expenseInput" placeholder="Xərc">
        <button class="btn" onclick="addData()">Əlavə et</button>
    </div>

    <!-- STATS -->
    <div class="main-stats">
        <div class="card">
            <div class="card-header">Ümumi Balans</div>
            <div class="card-value" id="balance">0 ₼</div>
        </div>
        <div class="card">
            <div class="card-header">Ümumi Gəlir</div>
            <div class="card-value" id="totalIncome">0 ₼</div>
        </div>
        <div class="card">
            <div class="card-header">Ümumi Xərc</div>
            <div class="card-value" id="totalExpense">0 ₼</div>
        </div>
        <div class="card">
            <div class="card-header">Yığım</div>
            <div class="card-value" id="saving">0 ₼</div>
        </div>
    </div>

    <!-- CHARTS -->
    <div class="charts-section">
        <div class="card">
            <h2>Gəlir və Xərc</h2>
            <div class="chart-container">
                <canvas id="lineChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Bölüşdürmə</h2>
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
            </div>
        </div>
    </div>

</div>

<script>
    let incomes = [];
    let expenses = [];

    let lineChart, doughnutChart;

    function updateStats() {
        const totalIncome = incomes.reduce((a, b) => a + b, 0);
        const totalExpense = expenses.reduce((a, b) => a + b, 0);
        const balance = totalIncome - totalExpense;

        document.getElementById('totalIncome').innerText = totalIncome + " ₼";
        document.getElementById('totalExpense').innerText = totalExpense + " ₼";
        document.getElementById('balance').innerText = balance + " ₼";
        document.getElementById('saving').innerText = balance + " ₼";
    }

    function drawCharts() {
        const labels = incomes.map((_, i) => "Gün " + (i + 1));

        if (lineChart) lineChart.destroy();
        if (doughnutChart) doughnutChart.destroy();

        lineChart = new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: {
                labels,
                datasets: [
                    { label: 'Gəlir', data: incomes, borderColor: '#1ed760' },
                    { label: 'Xərc', data: expenses, borderColor: '#ff4757' }
                ]
            }
        });

        doughnutChart = new Chart(document.getElementById('doughnutChart'), {
            type: 'doughnut',
            data: {
                labels: ['Gəlir', 'Xərc'],
                datasets: [{
                    data: [
                        incomes.reduce((a,b)=>a+b,0),
                        expenses.reduce((a,b)=>a+b,0)
                    ]
                }]
            }
        });
    }

    function addData() {
        const income = Number(document.getElementById('incomeInput').value);
        const expense = Number(document.getElementById('expenseInput').value);

        if (!income && !expense) {
            alert("Məlumat daxil et!");
            return;
        }

        incomes.push(income || 0);
        expenses.push(expense || 0);

        updateStats();
        drawCharts();
    }
</script>

</body>
</html>
