<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemə Giriş</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-container { background-color: #000000; width: 100%; max-width: 730px; padding: 80px 60px; border-radius: 8px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.8rem; margin-bottom: 40px; text-align: center; letter-spacing: -1px; }
        form { width: 100%; max-width: 320px; display: flex; flex-direction: column; }
        label { font-size: 0.875rem; font-weight: 700; margin-bottom: 8px; }
        input[type="text"], input[type="password"] { background-color: #121212; color: #ffffff; border: 1px solid #878787; border-radius: 4px; padding: 14px; font-size: 1rem; margin-bottom: 20px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #ffffff; box-shadow: inset 0 0 0 1px #ffffff; }
        .login-btn { background-color: #1ed760; color: #000000; border: none; border-radius: 500px; padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 20px; transition: background-color 0.2s, transform 0.1s; }
        .login-btn:hover { background-color: #1fdf64; transform: scale(1.04); }
        .login-btn:active { transform: scale(1); }
        .divider { margin: 30px 0; width: 100%; height: 1px; background: #333; }
        .switch { margin-top: 15px; font-size: 0.9rem; color: #aaa; cursor: pointer; }
        .switch:hover { color: #fff; }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Sənin Xərcin</h1>

    <!-- LOGIN -->
    <form id="loginForm">
        <label>İstifadəçi adı</label>
        <input type="text" id="username" placeholder="admin">

        <label>Şifrə</label>
        <input type="password" id="password" placeholder="12345">

        <button type="button" class="login-btn" id="loginBtn">Daxil ol</button>

        <div class="switch" onclick="toggleForms()">Hesabın yoxdur? Qeydiyyat et</div>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" style="display:none;">
        <label>İstifadəçi adı</label>
        <input type="text" id="regUsername">

        <label>Şifrə</label>
        <input type="password" id="regPassword">

        <button type="button" class="login-btn" id="registerBtn">Qeydiyyat</button>

        <div class="switch" onclick="toggleForms()">Artıq hesabın var? Daxil ol</div>
    </form>
</div>

<script>
    function toggleForms() {
        const login = document.getElementById('loginForm');
        const register = document.getElementById('registerForm');

        login.style.display = login.style.display === 'none' ? 'flex' : 'none';
        register.style.display = register.style.display === 'none' ? 'flex' : 'none';
    }

    // LOGIN
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            alert('Xanaları doldur!');
            return;
        }

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                alert('❌ ' + data.message);
            }
        } catch {
            alert('Server xətası!');
        }
    });

    // REGISTER
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();

        if (!username || !password) {
            alert('Xanaları doldur!');
            return;
        }

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (data.success) {
                alert('✅ Qeydiyyat uğurlu!');
                toggleForms(); // loginə qaytarır
            } else {
                alert('❌ ' + data.message);
            }
        } catch {
            alert('Server xətası!');
        }
    });
</script>

</body>
</html>
